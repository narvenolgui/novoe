<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Силуэт человека · Удлинённые руки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e9ecf0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 30px 25px 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
        }
        svg { display: block; width: 100%; height: auto; }
        .title {
            text-align: center;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.5rem;
        }
        .subtitle {
            text-align: center;
            margin-top: 20px;
            color: #4a627a;
            font-size: 0.95rem;
            border-top: 1px dashed #b0c4de;
            padding-top: 18px;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 20px;
            margin-top: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #2c3e50;
        }
        .color-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .print-btn {
            margin-top: 20px;
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(74,111,165,0.3);
            transition: 0.15s;
        }
        .print-btn:hover { background: #3a5a8a; }
        @media print {
            body { background: white; padding: 0.5cm; }
            .card { box-shadow: none; }
            .print-btn { display: none; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title">🧑‍🦱 Карта горячих точек</div>
    <svg viewBox="0 0 240 500" xmlns="http://www.w3.org/2000/svg">
        <!-- Тело с удлинёнными руками и чёткими стопами -->
        <path d="
            M 120 30
            C 138 30, 152 42, 155 60
            C 158 78, 150 92, 144 102
            L 162 128
            C 185 150, 200 170, 205 192
            C 210 214, 205 235, 190 250
            L 168 235
            L 152 285
            L 175 355
            L 180 395
            L 177 430
            L 170 458
            L 158 458
            L 154 440
            L 150 420
            L 142 395
            L 132 355
            L 127 335
            L 120 335
            L 115 355
            L 105 395
            L 97 420
            L 93 440
            L 89 458
            L 77 458
            L 70 430
            L 67 395
            L 72 355
            L 95 285
            L 79 235
            L 57 250
            C 42 235, 37 215, 42 192
            C 47 170, 62 150, 85 128
            L 103 102
            C 97 92, 89 78, 92 60
            C 95 42, 102 30, 120 30
            Z
        " fill="#ffffff" stroke="#1e2f3d" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>
        
        <!-- Голова -->
        <ellipse cx="120" cy="72" rx="34" ry="42" fill="#ffffff" stroke="#1e2f3d" stroke-width="2.8" />
        
        <!-- Шея -->
        <path d="M 102 110 L 102 120 M 138 110 L 138 120" stroke="#1e2f3d" stroke-width="2.5" stroke-linecap="round" />
        
        <!-- Стопы (явные) -->
        <path d="M 77 458 L 60 468 L 72 474 L 89 468 Z" fill="#ffffff" stroke="#1e2f3d" stroke-width="2.2" stroke-linejoin="round" />
        <path d="M 158 458 L 175 468 L 163 474 L 146 468 Z" fill="#ffffff" stroke="#1e2f3d" stroke-width="2.2" stroke-linejoin="round" />
        
        <!-- Вспомогательные линии (едва заметны) -->
        <path d="M 120 142 L 120 195" stroke="#1e2f3d" stroke-width="1" stroke-dasharray="4 4" opacity="0.25" />
        <path d="M 86 185 C 86 212, 100 232, 120 238 C 140 232, 154 212, 154 185" fill="none" stroke="#1e2f3d" stroke-width="1" opacity="0.25" />
    </svg>
    <div class="subtitle"><strong>Раскрась на силуэте, где ты чувствуешь:</strong></div>
    <div class="legend">
        <div class="legend-item"><span class="color-dot" style="background:#e74c3c;"></span> Злость</div>
        <div class="legend-item"><span class="color-dot" style="background:#3498db;"></span> Грусть</div>
        <div class="legend-item"><span class="color-dot" style="background:#f1c40f;"></span> Страх</div>
        <div class="legend-item"><span class="color-dot" style="background:#9b59b6;"></span> Пустота</div>
        <div class="legend-item"><span class="color-dot" style="background:#2ecc71;"></span> Спокойствие</div>
    </div>
    <div style="display:flex; justify-content:center;">
        <button class="print-btn" onclick="window.print()">🖨️ Распечатать силуэт</button>
    </div>
</div>
</body>
</html>
