<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подбор творческой терапии для подростка</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #e9f2f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .app-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 20, 50, 0.15);
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1a3e60;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subhead {
            font-size: 1rem;
            color: #4a627a;
            margin-bottom: 28px;
            border-left: 4px solid #7aa5c2;
            padding-left: 18px;
            font-weight: 400;
        }
        .progress-container {
            margin-bottom: 30px;
        }
        .progress-bar {
            height: 8px;
            background: #d9e2ec;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3a8ab3, #5fa3c9);
            border-radius: 20px;
            transition: width 0.4s ease;
        }
        .question-card {
            background: white;
            border-radius: 28px;
            padding: 28px 24px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
            margin-bottom: 28px;
            border: 1px solid #edf2f7;
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 500;
            color: #1e3b5c;
            margin-bottom: 28px;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            background: #f9fcff;
            border-radius: 60px;
            border: 1.5px solid #e2ebf3;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.05rem;
        }
        .option:hover {
            background: #e7f0f9;
            border-color: #9fbdd6;
        }
        .option input[type="radio"] {
            margin-right: 18px;
            accent-color: #3a8ab3;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .option.selected {
            background: #d4e7f7;
            border-color: #3a8ab3;
            box-shadow: 0 3px 8px rgba(58, 138, 179, 0.1);
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }
        button {
            background: white;
            border: 1.5px solid #b8cfde;
            color: #1e3b5c;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            min-width: 120px;
        }
        button.primary {
            background: #1e3b5c;
            border-color: #1e3b5c;
            color: white;
            box-shadow: 0 10px 18px -8px rgba(30, 59, 92, 0.3);
        }
        button.primary:hover {
            background: #15324e;
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .result-card {
            background: white;
            border-radius: 28px;
            padding: 28px 24px;
            margin-top: 15px;
        }
        .therapy-badge {
            display: inline-block;
            background: #1e3b5c;
            color: white;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 600;
            margin-bottom: 22px;
            font-size: 1.5rem;
        }
        .reason {
            background: #f1f7fd;
            padding: 22px;
            border-radius: 20px;
            margin: 22px 0;
            border-left: 6px solid #3a8ab3;
        }
        .scores-detail {
            font-size: 0.9rem;
            color: #4a627a;
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .score-item {
            background: #ecf3f9;
            padding: 5px 16px;
            border-radius: 40px;
        }
        .reset-btn {
            margin-top: 24px;
            width: 100%;
        }
        .error-message {
            color: #c23b3b;
            margin: 10px 0;
        }
        .footer-note {
            margin-top: 28px;
            font-size: 0.8rem;
            color: #6b8aa3;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>🎭 Терапия творчеством</h1>
    <div class="subhead">научно-ориентированный подбор для подростков</div>

    <!-- Экран вопросов -->
    <div id="quiz-screen">
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%;"></div>
            </div>
        </div>
        <div id="question-card" class="question-card">
            <div id="question-text" class="question-text">Загрузка...</div>
            <div id="options-container" class="options"></div>
        </div>
        <div class="nav-buttons">
            <button id="prev-btn" disabled>← Назад</button>
            <button id="next-btn" class="primary">Далее →</button>
        </div>
        <div id="error-message" class="error-message"></div>
    </div>

    <!-- Экран результатов -->
    <div id="result-screen" style="display: none;">
        <div class="result-card">
            <div style="font-size: 1.8rem; margin-bottom: 8px;">✨ Рекомендация</div>
            <div id="therapy-badge" class="therapy-badge"></div>
            <div id="therapy-description" style="font-size: 1.1rem; margin: 15px 0;"></div>
            <div id="reason-block" class="reason"></div>
            <div id="scores-detail" class="scores-detail"></div>
            <button id="reset-btn" class="primary reset-btn">🔄 Пройти заново</button>
        </div>
    </div>
    <div class="footer-note">
        * Рекомендация основана на анализе показаний к арт-, театральной, игровой и кинотерапии
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- НАУЧНО-ОБОСНОВАННЫЙ ОПРОСНИК ----------
        // Вопросы сгруппированы по терапевтическим шкалам.
        const questions = [
            // АРТ-ТЕРАПИЯ (art)
            { text: "Подростку трудно выражать свои чувства словами, он замыкается или становится раздражительным.", category: "art" },
            { text: "Ребёнок часто испытывает тревогу, подавленность или резкие перепады настроения.", category: "art" },
            { text: "Есть склонность к творчеству: любит рисовать, лепить, заниматься рукоделием.", category: "art" },
            // ТЕАТРАЛЬНАЯ ТЕРАПИЯ (theatre)
            { text: "У подростка проблемы с общением: ему сложно заводить друзей, он стесняется выступать перед классом.", category: "theatre" },
            { text: "Ребёнку нравится примерять на себя разные роли, участвовать в сценках, он эмоционально подвижен.", category: "theatre" },
            { text: "Подросток часто чувствует себя неуверенно в социуме, боится осуждения.", category: "theatre" },
            // ИГРОВАЯ ТЕРАПИЯ (play)
            { text: "Ребёнок склонен к агрессивным вспышкам, импульсивен, с трудом контролирует гнев.", category: "play" },
            { text: "Подросток испытывает сильные страхи, тревожность, возможно, пережил стрессовую ситуацию.", category: "play" },
            { text: "Ему/ей нравится играть (настольные, видеоигры, ролевые игры) и через игру он/а лучше расслабляется.", category: "play" },
            // КИНОТЕРАПИЯ (cinema)
            { text: "Подростку трудно анализировать свои эмоции и поступки, он не всегда понимает мотивы окружающих.", category: "cinema" },
            { text: "Ребёнок любит смотреть фильмы/сериалы и способен долго обсуждать персонажей и сюжеты.", category: "cinema" },
            { text: "Есть проблемы с самоконтролем, поведением или адаптацией в коллективе.", category: "cinema" }
        ];

        const categories = ['art', 'theatre', 'play', 'cinema'];
        const categoryNames = {
            art: 'Арт-терапия',
            theatre: 'Театральная терапия',
            play: 'Игровая терапия',
            cinema: 'Кинотерапия'
        };

        // Баллы по шкалам (0-3 за каждый вопрос)
        let scores = { art: 0, theatre: 0, play: 0, cinema: 0 };
        let currentIndex = 0;
        let answers = new Array(questions.length).fill(null);

        // DOM элементы
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress-fill');
        const errorMsg = document.getElementById('error-message');
        const resetBtn = document.getElementById('reset-btn');
        const therapyBadge = document.getElementById('therapy-badge');
        const therapyDescription = document.getElementById('therapy-description');
        const reasonBlock = document.getElementById('reason-block');
        const scoresDetail = document.getElementById('scores-detail');

        // Варианты ответов (Ликерт)
        const answerOptions = [
            { value: 0, label: "Совсем не подходит" },
            { value: 1, label: "Скорее не подходит" },
            { value: 2, label: "Отчасти подходит" },
            { value: 3, label: "Полностью подходит" }
        ];

        function renderQuestion() {
            const q = questions[currentIndex];
            questionText.textContent = `${currentIndex+1}. ${q.text}`;
            
            let html = '';
            const selectedVal = answers[currentIndex];
            answerOptions.forEach(opt => {
                const checked = (selectedVal === opt.value) ? 'checked' : '';
                html += `
                    <label class="option ${selectedVal === opt.value ? 'selected' : ''}">
                        <input type="radio" name="answer" value="${opt.value}" ${checked}> ${opt.label}
                    </label>
                `;
            });
            optionsContainer.innerHTML = html;

            // Навесить слушатели на radio
            document.querySelectorAll('input[name="answer"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const val = parseInt(e.target.value);
                    answers[currentIndex] = val;
                    // убрать ошибку
                    errorMsg.textContent = '';
                    // визуально подсветить выбранную опцию
                    document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                    e.target.closest('.option').classList.add('selected');
                    // обновить состояние кнопок
                    updateNavButtons();
                });
            });

            // обновить прогресс
            const progress = ((currentIndex) / questions.length) * 100;
            progressFill.style.width = progress + '%';
            updateNavButtons();
        }

        function updateNavButtons() {
            prevBtn.disabled = (currentIndex === 0);
            if (currentIndex === questions.length - 1) {
                nextBtn.textContent = 'Результат 🎯';
            } else {
                nextBtn.textContent = 'Далее →';
            }
            // если ответ не выбран, блокировать next? можно разрешить пропускать, но лучше подсветить ошибку
            const hasAnswer = answers[currentIndex] !== null;
            if (!hasAnswer && currentIndex < questions.length) {
                // не блокируем кнопку, но при клике покажем ошибку
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = false;
            }
        }

        function calculateScores() {
            // сброс
            categories.forEach(c => scores[c] = 0);
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                const ans = answers[i];
                if (ans !== null) {
                    scores[q.category] += ans;
                }
            }
        }

        function getTopCategory() {
            let maxCat = 'art';
            let maxScore = -1;
            categories.forEach(c => {
                if (scores[c] > maxScore) {
                    maxScore = scores[c];
                    maxCat = c;
                }
            });
            return { category: maxCat, score: maxScore };
        }

        function generateReason(category) {
            const reasons = {
                art: "Арт-терапия рекомендована, поскольку у подростка выражены трудности эмоционального выражения, тревожность или интерес к творчеству. Исследования показывают, что арт-терапия помогает безопасно выражать сложные чувства и снижать тревожность.",
                theatre: "Театральная терапия подходит, так как присутствуют сложности в общении и социализации. Драматерапия позволяет в безопасной обстановке развивать эмпатию и коммуникативные навыки.",
                play: "Игровая терапия показана при агрессивных проявлениях и тревожности. Через игру подросток учится управлять эмоциями и справляться со стрессом.",
                cinema: "Кинотерапия эффективна при трудностях с анализом эмоций и поведенческих проблемах. Обсуждение фильмов развивает самосознание и эмпатию."
            };
            return reasons[category] || "Рекомендация основана на научных показаниях.";
        }

        function showResult() {
            calculateScores();
            const top = getTopCategory();
            const catName = categoryNames[top.category];
            
            therapyBadge.textContent = catName;
            therapyDescription.textContent = `Наиболее выражены показания к ${catName.toLowerCase()}.`;
            reasonBlock.innerHTML = `<strong>🔬 Обоснование:</strong> ${generateReason(top.category)}`;
            
            let detailHtml = '';
            categories.forEach(c => {
                detailHtml += `<span class="score-item">${categoryNames[c]}: ${scores[c]} баллов</span>`;
            });
            scoresDetail.innerHTML = detailHtml;
            
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
        }

        function resetQuiz() {
            currentIndex = 0;
            answers = new Array(questions.length).fill(null);
            categories.forEach(c => scores[c] = 0);
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            errorMsg.textContent = '';
            renderQuestion();
        }

        function handleNext() {
            if (answers[currentIndex] === null) {
                errorMsg.textContent = 'Пожалуйста, выберите вариант ответа.';
                return;
            }
            if (currentIndex === questions.length - 1) {
                // Проверим, все ли ответы даны (можно пропускать, но предупредим)
                const missing = answers.some(a => a === null);
                if (missing) {
                    if (!confirm('Не на все вопросы даны ответы. Продолжить?')) {
                        return;
                    }
                }
                showResult();
            } else {
                currentIndex++;
                renderQuestion();
            }
        }

        function handlePrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // Инициализация и обработчики
        function init() {
            renderQuestion();
            nextBtn.addEventListener('click', handleNext);
            prevBtn.addEventListener('click', handlePrev);
            resetBtn.addEventListener('click', resetQuiz);
        }

        init();
    })();
</script>
</body>
</html>
