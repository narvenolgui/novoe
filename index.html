<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Силуэт человека · Удлинённые руки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e9ecf0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 30px 25px 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
        }
        svg { display: block; width: 100%; height: auto; }
        .title {
            text-align: center;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.5rem;
        }
        .subtitle {
            text-align: center;
            margin-top: 20px;
            color: #4a627a;
            font-size: 0.95rem;
            border-top: 1px dashed #b0c4de;
            padding-top: 18px;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 20px;
            margin-top: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #2c3e50;
        }
        .color-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .print-btn {
            margin-top: 20px;
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(74,111,165,0.3);
            transition: 0.15s;
        }
        .print-btn:hover { background: #3a5a8a; }
        @media print {
            body { background: white; padding: 0.5cm; }
            .card { box-shadow: none; }
            .print-btn { display: none; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title">🧑‍🦱 Карта горячих точек</div>
    <svg viewBox="0 0 240 520" xmlns="http://www.w3.org/2000/svg">
        <!-- ТЕЛО: туловище и ноги -->
        <path d="
            M 120 30
            C 135 30, 148 40, 152 58
            C 156 76, 148 90, 142 100
            L 160 125
            C 180 145, 195 165, 200 185
            C 205 205, 200 225, 185 240
            L 165 225
            L 150 275
            L 172 345
            L 178 390
            L 175 425
            L 168 460
            L 155 460
            L 152 440
            L 148 415
            L 140 385
            L 130 345
            L 125 325
            L 120 325
            L 115 345
            L 105 385
            L 97 415
            L 93 440
            L 90 460
            L 77 460
            L 70 425
            L 67 390
            L 72 345
            L 95 275
            L 80 225
            L 60 240
            C 45 225, 40 205, 45 185
            C 50 165, 65 145, 85 125
            L 103 100
            C 97 90, 89 76, 92 58
            C 95 40, 105 30, 120 30
            Z
        " fill="#ffffff" stroke="#1e2f3d" stroke-width="2.8" stroke-linejoin="round"/>

        <!-- ГОЛОВА -->
        <ellipse cx="120" cy="72" rx="34" ry="42" fill="#ffffff" stroke="#1e2f3d" stroke-width="2.8" />

        <!-- ШЕЯ -->
        <path d="M 102 110 L 102 120 M 138 110 L 138 120" stroke="#1e2f3d" stroke-width="2.5" stroke-linecap="round" />

        <!-- РУКИ (удлинённые, доходят до середины бедра) -->
        <!-- Левая рука -->
        <path d="
            M 57 130
            C 45 150, 35 180, 30 210
            C 25 240, 28 260, 32 280
            L 38 285
            C 45 270, 48 250, 50 230
            C 52 210, 58 190, 65 170
            L 75 145
            Z
        " fill="#ffffff" stroke="#1e2f3d" stroke-width="2.5" stroke-linejoin="round" />
        
        <!-- Правая рука -->
        <path d="
            M 188 130
            C 200 150, 210 180, 215 210
            C 220 240, 217 260, 213 280
            L 207 285
            C 200 270, 197 250, 195 230
            C 193 210, 187 190, 180 170
            L 170 145
            Z
        " fill="#ffffff" stroke="#1e2f3d" stroke-width="2.5" stroke-linejoin="round" />

        <!-- СТОПЫ -->
        <path d="M 77 460 L 58 472 L 70 478 L 89 472 Z" fill="#ffffff" stroke="#1e2f3d" stroke-width="2.2" stroke-linejoin="round" />
        <path d="M 155 460 L 174 472 L 162 478 L 143 472 Z" fill="#ffffff" stroke="#1e2f3d" stroke-width="2.2" stroke-linejoin="round" />

        <!-- Вспомогательные линии -->
        <path d="M 120 140 L 120 200" stroke="#1e2f3d" stroke-width="1" stroke-dasharray="4 4" opacity="0.25" />
    </svg>
    <div class="subtitle"><strong>Раскрась на силуэте, где ты чувствуешь:</strong></div>
    <div class="legend">
        <div class="legend-item"><span class="color-dot" style="background:#e74c3c;"></span> Злость</div>
        <div class="legend-item"><span class="color-dot" style="background:#3498db;"></span> Грусть</div>
        <div class="legend-item"><span class="color-dot" style="background:#f1c40f;"></span> Страх</div>
        <div class="legend-item"><span class="color-dot" style="background:#9b59b6;"></span> Пустота</div>
        <div class="legend-item"><span class="color-dot" style="background:#2ecc71;"></span> Спокойствие</div>
    </div>
    <div style="display:flex; justify-content:center;">
        <button class="print-btn" onclick="window.print()">🖨️ Распечатать силуэт</button>
    </div>
</div>
</body>
</html>
