<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Силуэт человека · Контур для раскрашивания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f1f4f8 0%, #e2e6eb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 30px 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 30px 30px 25px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 100%;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        }

        .title {
            text-align: center;
            margin-bottom: 15px;
            color: #34495e;
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            margin-top: 20px;
            color: #5d7a9a;
            font-weight: 400;
            font-size: 0.95rem;
            border-top: 1px dashed #b0c4de;
            padding-top: 18px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 20px;
            margin-top: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #2c3e50;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .print-btn {
            margin-top: 20px;
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(74, 111, 165, 0.3);
            transition: 0.15s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .print-btn:hover {
            background: #3a5a8a;
            box-shadow: 0 6px 12px rgba(74, 111, 165, 0.4);
        }

        @media print {
            body { background: white; padding: 0.5cm; }
            .card { box-shadow: none; padding: 0; }
            .print-btn { display: none; }
            .subtitle { border-top: 1px solid #aaa; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">🧑‍🦱 Карта горячих точек</div>
        <svg viewBox="0 0 220 440" xmlns="http://www.w3.org/2000/svg">
            <!-- Основной контур тела (вид спереди, плавные линии) -->
            <path d="
                M 110 28
                C 125 28, 138 38, 142 55
                C 146 72, 138 85, 132 95
                L 150 118
                C 168 138, 182 155, 186 175
                C 190 195, 185 215, 170 228
                L 148 215
                L 136 260
                L 158 330
                L 162 370
                L 155 410
                L 135 410
                L 125 370
                L 115 330
                L 110 310
                L 105 330
                L 95 370
                L 85 410
                L 65 410
                L 58 370
                L 62 330
                L 84 260
                L 72 215
                L 50 228
                C 35 215, 30 195, 34 175
                C 38 155, 52 138, 70 118
                L 88 95
                C 82 85, 74 72, 78 55
                C 82 38, 95 28, 110 28
                Z
            " fill="#ffffff" stroke="#3a5a7a" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>
            
            <!-- Контур головы (лицо) — овал, чтобы было понятнее -->
            <ellipse cx="110" cy="65" rx="28" ry="36" fill="#ffffff" stroke="#3a5a7a" stroke-width="2.5" />
            
            <!-- Шея (уточняющая линия) -->
            <path d="M 95 98 L 95 108 M 125 98 L 125 108" stroke="#3a5a7a" stroke-width="2" stroke-linecap="round" />
            
            <!-- Внутренние линии (грудь, талия, локти) для реалистичности -->
            <path d="M 110 130 L 110 180" stroke="#3a5a7a" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5" />
            <path d="M 80 170 C 80 190, 90 210, 110 215 C 130 210, 140 190, 140 170" fill="none" stroke="#3a5a7a" stroke-width="1.2" opacity="0.4" />
            
            <!-- Линии сгибов локтей -->
            <path d="M 70 118 L 62 108 M 150 118 L 158 108" stroke="#3a5a7a" stroke-width="1.2" opacity="0.4" />
        </svg>
        
        <div class="subtitle">
            <strong>Раскрась на силуэте, где ты чувствуешь:</strong>
        </div>
        <div class="legend">
            <div class="legend-item"><span class="color-dot" style="background: #e74c3c;"></span> Злость</div>
            <div class="legend-item"><span class="color-dot" style="background: #3498db;"></span> Грусть</div>
            <div class="legend-item"><span class="color-dot" style="background: #f1c40f;"></span> Страх</div>
            <div class="legend-item"><span class="color-dot" style="background: #9b59b6;"></span> Пустота</div>
            <div class="legend-item"><span class="color-dot" style="background: #2ecc71;"></span> Спокойствие</div>
        </div>
        <div style="display: flex; justify-content: center;">
            <button class="print-btn" onclick="window.print()">🖨️ Распечатать силуэт</button>
        </div>
    </div>
</body>
</html>
