<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Силуэт человека</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .silhouette {
            width: 300px;
            height: 600px;
        }
    </style>
</head>
<body>
    <svg class="silhouette" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
        <!-- Силуэт человека (вид спереди) -->
        <path d="
            M 100 20
            C 100 20, 115 25, 120 40
            C 125 55, 120 70, 120 70
            L 140 90
            C 155 105, 170 120, 175 140
            C 180 160, 175 180, 160 190
            L 140 180
            L 130 220
            L 150 280
            L 155 320
            L 150 360
            L 130 360
            L 120 320
            L 110 280
            L 100 260
            L 90 280
            L 80 320
            L 70 360
            L 50 360
            L 45 320
            L 50 280
            L 70 220
            L 60 180
            L 40 190
            C 25 180, 20 160, 25 140
            C 30 120, 45 105, 60 90
            L 80 70
            C 80 70, 75 55, 80 40
            C 85 25, 100 20, 100 20
            Z
        " fill="#B0BEC5" stroke="#78909C" stroke-width="2"/>
        <!-- Внутренний контур головы (лицо) для обозначения -->
        <ellipse cx="100" cy="55" rx="20" ry="25" fill="#B0BEC5" stroke="#78909C" stroke-width="2"/>
    </svg>
    <p style="text-align: center; margin-top: 10px; font-family: Arial; color: #555;">Силуэт для методики «Горячие точки тела»</p>
</body>
</html>
