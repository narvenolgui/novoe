<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Парные согласные в корне слова | 2 класс | Русский язык</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #d9e6db;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: #fffef7;
            border-radius: 64px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: #7fa87f;
            padding: 20px 28px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #fff3e0;
        }
        .header p {
            font-size: 1rem;
            background: #fff0e0;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 60px;
            font-weight: bold;
            color: #3a6b4a;
            margin-top: 8px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #fef3da;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #7fa87f;
            border-bottom: 3px solid #c9b68b;
        }
        .score-box, .question-counter {
            background: #ffffff;
            padding: 6px 20px;
            border-radius: 60px;
        }
        .content {
            padding: 25px;
        }
        .intro-slide, .pair-rule {
            background: #fffaf0;
            border-radius: 48px;
            padding: 25px;
            text-align: center;
        }
        .intro-slide h2, .pair-rule h2 {
            font-size: 1.6rem;
            color: #7fa87f;
            margin-bottom: 20px;
        }
        .intro-slide p, .pair-rule p {
            font-size: 1.2rem;
            line-height: 1.4;
            color: #2c3e2e;
            margin-bottom: 20px;
        }
        .intro-slide ul {
            text-align: left;
            font-size: 1.2rem;
            padding-left: 30px;
            margin: 20px 0;
            list-style: none;
        }
        .intro-slide li {
            margin: 12px 0;
        }
        .example-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }
        .example-item {
            font-size: 1.3rem;
            background: #e6f6f3;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            color: #1e5a4a;
        }
        .pair-badge {
            font-size: 1.8rem;
            font-weight: bold;
            background: #ffe0b5;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 80px;
            margin: 15px 0;
            color: #b45f1b;
        }
        .task-card {
            background: #fffaf0;
            border-radius: 60px;
            padding: 25px;
            text-align: center;
        }
        .task-word {
            font-size: 2.5rem;
            font-weight: bold;
            background: #e6f6f3;
            padding: 25px 20px;
            border-radius: 70px;
            letter-spacing: 6px;
            color: #1e5a4a;
            margin: 20px 0;
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 25px 0;
        }
        .opt-btn {
            background: #7fa87f;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 80px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 0 #3a6b4a;
            color: white;
            min-width: 100px;
            transition: 0.05s linear;
        }
        .opt-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #3a6b4a;
        }
        .opt-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: default;
        }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .correct-feedback {
            background: #d9f0da;
            color: #1e5a2a;
            border-left: 10px solid #2e7d32;
        }
        .wrong-feedback {
            background: #ffe0e0;
            color: #a1131e;
            border-left: 10px solid #d32f2f;
        }
        .next-btn {
            background: #f4a261;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 25px;
            cursor: pointer;
            font-family: inherit;
            color: white;
            box-shadow: 0 5px 0 #c45c2c;
        }
        .final-screen {
            background: #fffaf0;
            border-radius: 60px;
            padding: 25px;
            text-align: center;
        }
        .final-screen h2 {
            font-size: 1.6rem;
            color: #7fa87f;
        }
        .final-score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
            color: #1e5a2a;
            background: #fef3da;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 60px;
        }
        .bright-rules {
            background: #ffe0b5;
            border-radius: 50px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .bright-rules p {
            font-size: 1rem;
            margin: 12px 0;
            font-weight: bold;
            color: #4a2e2a;
        }
        .restart-btn {
            background: #7fa87f;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            color: white;
        }
        @media (max-width: 550px) {
            .task-word { font-size: 1.8rem; letter-spacing: 4px; }
            .opt-btn { font-size: 1.5rem; padding: 8px 20px; min-width: 80px; }
            .next-btn { font-size: 1.1rem; }
            .example-item { font-size: 1rem; padding: 6px 15px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <div class="header">
        <h1>Парные согласные в корне слова</h1>
        <p>2 класс · Русский язык</p>
    </div>
    <div class="stats">
        <div class="score-box">⭐ Очки: <span id="scoreValue">0</span></div>
        <div class="question-counter">📋 <span id="phaseInfo">Вступление</span></div>
    </div>
    <div class="content" id="mainContent"></div>
</div>

<script>
    // --------------------------------------------------------------
    // ПАРЫ СОГЛАСНЫХ: примеры для объяснения и отдельные слова для заданий
    // В примерах: зуб – зубы, глаз – глаза, столб – столбы (только один пример на б-п)
    // В заданиях: другие слова (гриб, суп, хлеб, шарф, рукав, верблюд, друг, сапог, лук, город, сад, крот, ёж, карандаш, стриж, арбуз, ананас, берёза)
    // --------------------------------------------------------------
    const pairsData = [
        { 
            name: "б–п",
            examples: "зуб – зубы",
            tasks: [
                { word: "гри_", correct: "б", hint: "Проверочное слово: грибы", image: "🍄" },
                { word: "су_", correct: "п", hint: "Проверочное слово: супы", image: "🍲" },
                { word: "хле_", correct: "б", hint: "Проверочное слово: хлеба", image: "🍞" }
            ]
        },
        { 
            name: "в–ф",
            examples: "рукав – рукава, жираф – жирафы",
            tasks: [
                { word: "шар_", correct: "ф", hint: "Проверочное слово: шарфы", image: "🧣" },
                { word: "рука_", correct: "в", hint: "Проверочное слово: рукава", image: "👕" },
                { word: "верблю_", correct: "д", hint: "Проверочное слово: верблюды", image: "🐫" }
            ]
        },
        { 
            name: "г–к",
            examples: "снег – снега, сапог – сапоги",
            tasks: [
                { word: "дру_", correct: "г", hint: "Проверочное слово: друзья", image: "👫" },
                { word: "сапо_", correct: "г", hint: "Проверочное слово: сапоги", image: "👢" },
                { word: "лу_", correct: "к", hint: "Проверочное слово: луки", image: "🏹" }
            ]
        },
        { 
            name: "д–т",
            examples: "след – следы, город – города",
            tasks: [
                { word: "горо_", correct: "д", hint: "Проверочное слово: города", image: "🏙️" },
                { word: "са_", correct: "д", hint: "Проверочное слово: сады", image: "🌳" },
                { word: "кро_", correct: "т", hint: "Проверочное слово: кроты", image: "🐭" }
            ]
        },
        { 
            name: "ж–ш",
            examples: "этаж – этажи, карандаш – карандаши",
            tasks: [
                { word: "ё_", correct: "ж", hint: "Проверочное слово: ежи", image: "🦔" },
                { word: "каранда_", correct: "ш", hint: "Проверочное слово: карандаши", image: "✏️" },
                { word: "стри_", correct: "ж", hint: "Проверочное слово: стрижи", image: "🐦" }
            ]
        },
        { 
            name: "з–с",
            examples: "глаз – глаза, ананас – ананасы",
            tasks: [
                { word: "арбу_", correct: "з", hint: "Проверочное слово: арбузы", image: "🍉" },
                { word: "анана_", correct: "с", hint: "Проверочное слово: ананасы", image: "🍍" },
                { word: "бере_", correct: "з", hint: "Проверочное слово: берёзы", image: "🌲" }
            ]
        }
    ];

    // ВСТУПИТЕЛЬНЫЕ СЛАЙДЫ
    const introSlides = [
        { title: "Здравствуй, ученик!",
          text: "В русском языке есть парные согласные буквы: б–п, в–ф, г–к, д–т, ж–ш, з–с. В конце слова парную согласную нужно проверять, чтобы не ошибиться в написании.",
          list: null },
        { title: "Как проверить парную согласную?",
          text: "Чтобы правильно написать парную согласную в конце слова, измени слово так, чтобы после этой буквы стоял гласный. Например:",
          list: ["зуб – зубы (буква б)", "глаз – глаза (буква з)", "рукав – рукава (буква в)"] }
    ];

    // ПОСТРОЕНИЕ ЭТАПОВ
    let stages = [
        { type: "intro", index: 0 },
        { type: "intro", index: 1 }
    ];
    for (let pi = 0; pi < pairsData.length; pi++) {
        stages.push({ type: "pairRule", pairIndex: pi });
        for (let ti = 0; ti < pairsData[pi].tasks.length; ti++) {
            stages.push({ type: "task", pairIndex: pi, taskIndex: ti });
        }
    }

    let currentStage = 0;
    let totalScore = 0;
    let taskAnswers = {};
    const maxScore = (() => {
        let cnt = 0;
        for (let st of stages) if (st.type === "task") cnt++;
        return cnt * 20;
    })();

    const contentDiv = document.getElementById('mainContent');
    const scoreSpan = document.getElementById('scoreValue');
    const phaseInfoSpan = document.getElementById('phaseInfo');

    function updateUI() {
        scoreSpan.innerText = totalScore;
        if (currentStage < stages.length) {
            const stage = stages[currentStage];
            if (stage.type === "task") {
                let done = Object.keys(taskAnswers).length;
                let total = stages.filter(s => s.type === "task").length;
                phaseInfoSpan.innerText = `Задание ${done+1} из ${total}`;
            } else if (stage.type === "pairRule") {
                phaseInfoSpan.innerText = `Правило ${stage.pairIndex+1} из ${pairsData.length}`;
            } else if (stage.type === "intro") {
                phaseInfoSpan.innerText = `Вступление ${stage.index+1} из 2`;
            }
        } else {
            phaseInfoSpan.innerText = "Результат";
        }
    }

    function render() {
        if (currentStage >= stages.length) {
            showFinalScreen();
            return;
        }
        const stage = stages[currentStage];
        if (stage.type === "intro") renderIntro(stage.index);
        else if (stage.type === "pairRule") renderPairRule(stage.pairIndex);
        else if (stage.type === "task") renderTask(stage.pairIndex, stage.taskIndex);
        updateUI();
    }

    function renderIntro(idx) {
        const slide = introSlides[idx];
        let html = `<div class="intro-slide"><h2>${slide.title}</h2><p>${slide.text}</p>`;
        if (slide.list) {
            html += `<ul>${slide.list.map(item => `<li>• ${item}</li>`).join('')}</ul>`;
        }
        html += `<button class="next-btn" id="introNextBtn">➡ ДАЛЬШЕ</button></div>`;
        contentDiv.innerHTML = html;
        document.getElementById('introNextBtn')?.addEventListener('click', () => {
            currentStage++;
            render();
        });
    }

    function renderPairRule(pairIndex) {
        const pair = pairsData[pairIndex];
        const examplesHtml = pair.examples.split(',').map(ex => `<span class="example-item">${ex.trim()}</span>`).join('');
        const html = `
            <div class="pair-rule">
                <h2>Правило ${pair.name}</h2>
                <div class="pair-badge">${pair.name}</div>
                <p>Парные согласные буквы <strong>${pair.name}</strong> в конце слова нужно проверять. Измени слово: поставь его во множественное число или подбери однокоренное слово, чтобы после согласной буквы стояла гласная буква.</p>
                <div class="example-list">
                    ${examplesHtml}
                </div>
                <button class="next-btn" id="nextRuleBtn">➡ ТРЕНИРУЕМСЯ</button>
            </div>
        `;
        contentDiv.innerHTML = html;
        document.getElementById('nextRuleBtn')?.addEventListener('click', () => {
            currentStage++;
            render();
        });
    }

    function renderTask(pairIndex, taskIndex) {
        const pair = pairsData[pairIndex];
        const task = pair.tasks[taskIndex];
        const answerKey = `${pairIndex}_${taskIndex}`;
        const alreadyAnswered = taskAnswers[answerKey] !== undefined;

        const displayWord = task.word.replace('_', '_');
        let feedbackHtml = '';
        let disabled = false;

        if (alreadyAnswered) {
            const chosen = taskAnswers[answerKey];
            const isCorrect = (chosen === task.correct);
            disabled = true;
            feedbackHtml = `
                <div class="feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">
                    ${isCorrect ? '✅ Верно! ' + task.hint : '❌ Неверно. ' + task.hint + ' Правильная буква — ' + task.correct + '.'}
                </div>
            `;
        }

        let wrongLetter = '';
        if (task.correct === 'б') wrongLetter = 'п';
        else if (task.correct === 'п') wrongLetter = 'б';
        else if (task.correct === 'в') wrongLetter = 'ф';
        else if (task.correct === 'ф') wrongLetter = 'в';
        else if (task.correct === 'г') wrongLetter = 'к';
        else if (task.correct === 'к') wrongLetter = 'г';
        else if (task.correct === 'д') wrongLetter = 'т';
        else if (task.correct === 'т') wrongLetter = 'д';
        else if (task.correct === 'ж') wrongLetter = 'ш';
        else if (task.correct === 'ш') wrongLetter = 'ж';
        else if (task.correct === 'з') wrongLetter = 'с';
        else if (task.correct === 'с') wrongLetter = 'з';

        let optionsHtml = `
            <div class="options">
                <button class="opt-btn" data-letter="${task.correct}" ${disabled ? 'disabled' : ''}>${task.correct}</button>
                <button class="opt-btn" data-letter="${wrongLetter}" ${disabled ? 'disabled' : ''}>${wrongLetter}</button>
            </div>
        `;

        let nextButtonHtml = '';
        if (alreadyAnswered) {
            nextButtonHtml = `<button class="next-btn" id="nextTaskBtn">➡ ДАЛЬШЕ</button>`;
        }

        const html = `
            <div class="task-card">
                <div style="font-size: 1.2rem; margin-bottom: 10px;">${task.image} Пара: ${pair.name}</div>
                <div class="task-word">${displayWord}</div>
                ${optionsHtml}
                ${feedbackHtml}
                ${nextButtonHtml}
            </div>
        `;
        contentDiv.innerHTML = html;

        if (!alreadyAnswered) {
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (taskAnswers[answerKey] !== undefined) return;
                    const chosen = btn.getAttribute('data-letter');
                    taskAnswers[answerKey] = chosen;
                    const isCorrect = (chosen === task.correct);
                    if (isCorrect) {
                        totalScore += 20;
                        updateUI();
                    }
                    renderTask(pairIndex, taskIndex);
                });
            });
        } else {
            const nextBtn = document.getElementById('nextTaskBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    currentStage++;
                    render();
                });
            }
        }
    }

    function showFinalScreen() {
        const earned = totalScore;
        let message = '';
        if (earned === maxScore) {
            message = '🎉🎉🎉 Ты молодец! Отлично знаешь парные согласные! 🎉🎉🎉';
        } else if (earned >= maxScore - 20) {
            message = '👍 Хорошо! Повтори правило и будет ещё лучше!';
        } else {
            message = '📚 Попробуй пройти игру ещё раз. Вспомни, как проверять буквы: измени слово. У тебя получится!';
        }
        const finalHtml = `
            <div class="final-screen">
                <h2>🏆 Твой результат</h2>
                <div class="final-score">${earned} / ${maxScore}</div>
                <p style="font-size:1.2rem;">${message}</p>
                <div class="bright-rules">
                    <p>🐢 Запомни правила проверки парных согласных:</p>
                    <p>1️⃣ Парные согласные буквы: б–п, в–ф, г–к, д–т, ж–ш, з–с.</p>
                    <p>2️⃣ Чтобы проверить парную согласную в конце слова, измени слово: поставь его во множественное число или подбери однокоренное слово так, чтобы после согласной буквы стояла гласная буква.</p>
                    <p>3️⃣ Примеры: зуб – зубы, глаз – глаза, рукав – рукава.</p>
                    <p>4️⃣ Тренируйся, и у тебя всё получится!</p>
                </div>
                <button class="restart-btn" id="restartGameBtn">🔄 Пройти заново</button>
            </div>
        `;
        contentDiv.innerHTML = finalHtml;
        document.getElementById('restartGameBtn')?.addEventListener('click', () => {
            currentStage = 0;
            totalScore = 0;
            taskAnswers = {};
            render();
            updateUI();
        });
    }

    render();
    updateUI();
</script>
</body>
</html>
