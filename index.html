<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Силуэт человека · Контур с длинными руками и стопами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f1f4f8 0%, #e2e6eb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 30px 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 30px 30px 25px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 100%;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        }

        .title {
            text-align: center;
            margin-bottom: 15px;
            color: #34495e;
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            margin-top: 20px;
            color: #5d7a9a;
            font-weight: 400;
            font-size: 0.95rem;
            border-top: 1px dashed #b0c4de;
            padding-top: 18px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 20px;
            margin-top: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #2c3e50;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .print-btn {
            margin-top: 20px;
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(74, 111, 165, 0.3);
            transition: 0.15s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .print-btn:hover {
            background: #3a5a8a;
            box-shadow: 0 6px 12px rgba(74, 111, 165, 0.4);
        }

        @media print {
            body { background: white; padding: 0.5cm; }
            .card { box-shadow: none; padding: 0; }
            .print-btn { display: none; }
            .subtitle { border-top: 1px solid #aaa; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">🧑 Карта горячих точек</div>
        <svg viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg">
            <!-- Основной контур тела (руки удлинены, стопы прорисованы) -->
            <path d="
                M 120 30
                C 135 30, 148 40, 152 58
                C 156 76, 148 90, 142 100
                L 160 125
                C 180 145, 195 165, 200 185
                C 205 205, 200 225, 185 240
                L 162 225
                L 148 275
                L 170 345
                L 175 385
                L 172 420
                L 165 445
                L 155 445
                L 152 430
                L 148 410
                L 140 385
                L 130 345
                L 125 325
                L 120 325
                L 115 345
                L 105 385
                L 97 410
                L 93 430
                L 90 445
                L 80 445
                L 73 420
                L 70 385
                L 75 345
                L 97 275
                L 83 225
                L 60 240
                C 45 225, 40 205, 45 185
                C 50 165, 65 145, 85 125
                L 103 100
                C 97 90, 89 76, 93 58
                C 97 40, 105 30, 120 30
                Z
            " fill="#ffffff" stroke="#2c3e50" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>
            
            <!-- Голова (чёткий овал) -->
            <ellipse cx="120" cy="72" rx="32" ry="40" fill="#ffffff" stroke="#2c3e50" stroke-width="2.8" />
            
            <!-- Шея -->
            <path d="M 104 108 L 104 118 M 136 108 L 136 118" stroke="#2c3e50" stroke-width="2.5" stroke-linecap="round" />
            
            <!-- Стопы (дополнительные контуры для ясности) -->
            <path d="M 80 445 L 65 455 L 75 460 L 90 455 Z" fill="#ffffff" stroke="#2c3e50" stroke-width="2" stroke-linejoin="round" />
            <path d="M 155 445 L 170 455 L 160 460 L 145 455 Z" fill="#ffffff" stroke="#2c3e50" stroke-width="2" stroke-linejoin="round" />
            
            <!-- Вспомогательные линии (слегка намечены) -->
            <path d="M 120 140 L 120 190" stroke="#2c3e50" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.3" />
            <path d="M 88 180 C 88 205, 100 225, 120 230 C 140 225, 152 205, 152 180" fill="none" stroke="#2c3e50" stroke-width="1" opacity="0.3" />
            
            <!-- Локтевые сгибы (для ориентации) -->
            <path d="M 85 125 L 75 115 M 155 125 L 165 115" stroke="#2c3e50" stroke-width="1" opacity="0.3" />
        </svg>
        
        <div class="subtitle">
            <strong>Раскрась на силуэте, где ты чувствуешь:</strong>
        </div>
        <div class="legend">
            <div class="legend-item"><span class="color-dot" style="background: #e74c3c;"></span> Злость</div>
            <div class="legend-item"><span class="color-dot" style="background: #3498db;"></span> Грусть</div>
            <div class="legend-item"><span class="color-dot" style="background: #f1c40f;"></span> Страх</div>
            <div class="legend-item"><span class="color-dot" style="background: #9b59b6;"></span> Пустота</div>
            <div class="legend-item"><span class="color-dot" style="background: #2ecc71;"></span> Спокойствие</div>
        </div>
        <div style="display: flex; justify-content: center;">
            <button class="print-btn" onclick="window.print()">🖨️ Распечатать силуэт</button>
        </div>
    </div>
</body>
</html>
